rules:
# localhost
  - DOMAIN,localhost,DIRECT
  - IP-CIDR,127.0.0.1/32,DIRECT
  - IP-CIDR6,::1/128,DIRECT

# local networks
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT

# твоё PAC
  - DOMAIN-SUFFIX,2ip.ru,DIRECT,no-resolve
  - DOMAIN-SUFFIX,istu.ru,DIRECT,no-resolve
  - DOMAIN,sso.ya.ru,DIRECT,no-resolve
  - DOMAIN-SUFFIX,rutube.ru,DIRECT,no-resolve
  - DOMAIN-SUFFIX,kinopoisk.ru,DIRECT,no-resolve
  - DOMAIN-SUFFIX,vk.com,DIRECT,no-resolve
  - DOMAIN-SUFFIX,reddit.com,DIRECT,no-resolve
  - DOMAIN-SUFFIX,aperisolve.com,DIRECT,no-resolve
  - DOMAIN-SUFFIX,dom.ru,DIRECT,no-resolve
  - DOMAIN-SUFFIX,nalog.ru,DIRECT,no-resolve
  - DOMAIN-SUFFIX,pikuco.ru,DIRECT,no-resolve
  - DOMAIN-SUFFIX,cardlink.link,DIRECT,no-resolve
  - DOMAIN-SUFFIX,caplag.ru,DIRECT,no-resolve
  - DOMAIN-SUFFIX,ozon.ru,DIRECT,no-resolve

# yandex rules
  - DOMAIN-KEYWORD,yandex,DIRECT,no-resolve
  - DOMAIN-KEYWORD,yastatic,DIRECT,no-resolve
  - DOMAIN-KEYWORD,ya,DIRECT,no-resolve

# default
  - MATCH,PROXY

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80,8080-8880]
    TLS:
      ports: [443,8443]