dns:
  default-nameserver:
  - system
  - 192.168.3.104
  direct-nameserver:
  - 192.168.3.104
  direct-nameserver-follow-policy: false
  enable: true
  enhanced-mode: fake-ip
  fake-ip-filter:
  - '*.lan'
  - '*.local'
  - '*.arpa'
  - time.*.com
  - ntp.*.com
  - time.*.com
  - +.market.xiaomi.com
  - localhost.ptlogin2.qq.com
  - '*.msftncsi.com'
  - www.msftconnecttest.com
  fake-ip-filter-mode: blacklist
  fake-ip-range: 198.18.0.1/16
  fallback: []
  fallback-filter:
    domain: []
    geoip: false
    geoip-code: CN
    ipcidr:
    - 240.0.0.0/4
    - 0.0.0.0/32
  ipv6: false
  listen: :53
  nameserver:
  - 192.168.3.104
  prefer-h3: false
  proxy-server-nameserver:
  - tls://1.1.1.1
  - https://dns.cloudflare.com/dns-query
  respect-rules: true
  use-hosts: true
  use-system-hosts: true
